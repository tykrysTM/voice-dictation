apiVersion: apps/v1
kind: Deployment
metadata:
  name: voice-dictation
  namespace: voice-dictation
  labels:
    app: voice-dictation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: voice-dictation
  template:
    metadata:
      labels:
        app: voice-dictation
    spec:
      imagePullSecrets:
        - name: ghcr-credentials
      containers:
        - name: voice-dictation
          image: ghcr.io/tykrystm/voice-dictation:0ce3f88
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: voice-dictation-secrets
          env:
            # Cache Whisper models on host to avoid re-download on restart
            - name: HF_HOME
              value: /cache/huggingface
          resources:
            requests:
              cpu: "250m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            # Give plenty of time for model download on first start
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          volumeMounts:
            - name: model-cache
              mountPath: /cache
      volumes:
        - name: model-cache
          hostPath:
            path: /data/voice-dictation-cache
            type: DirectoryOrCreate

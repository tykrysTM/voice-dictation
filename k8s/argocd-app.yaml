apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: voice-dictation
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/tykrysTM/voice-dictation.git
    targetRevision: HEAD
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: voice-dictation
  sync:
    prune: true
    revision: HEAD
  revisionCheckFrequency: 10s
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

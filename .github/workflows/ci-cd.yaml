name: CI/CD — Build & Push to GHCR

on:
  push:
    branches: [main]
    paths: ['backend/**', 'frontend/**', 'Dockerfile', 'backend/Dockerfile', '.github/workflows/**']

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: tykrystm/voice-dictation

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r backend/requirements.txt pytest httpx
      - name: Run tests
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short
        env:
          WHISPER_MODEL: tiny
          OLLAMA_URL: http://localhost:11434/api/chat

  build-and-push:
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.sha.outputs.short }}
      - name: Update image tag in k8s/deployment.yaml
        run: |
          NEW_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.sha.outputs.short }}"
          sed -i "s|image: ghcr.io/tykrystm/voice-dictation:.*|image: ${NEW_TAG}|g" k8s/deployment.yaml
      - name: Commit and push updated deployment.yaml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          git diff --staged --quiet || git commit -m "ci: update image to ${{ steps.sha.outputs.short }} [skip ci]"
          git pull --rebase origin main
          git push

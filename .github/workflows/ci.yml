name: Voice Dictation CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/**'
      - 'Dockerfile'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run linter
        run: |
          # TODO: add flake8/pylint
          echo "Linter pending"

      - name: Build Docker image
        run: |
          docker build -t ghcr.io/tykrystm/voice-dictation:latest \
            --build-arg OLLAMA_URL=http://192.168.1.5:11434 \
            .

      - name: Push to GHCR
        uses: docker/setup-buildx-action@v3
        with:
          push: true
          tags: ghcr.io/tykrystm/voice-dictation:latest,ghcr.io/tykrystm/voice-dictation:${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: CI/CD — Build & Push to GHCR

on:
  push:
    branches: [master]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/**'
    tags-ignore: ['**']

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./backend/backend
          push: true
          tags: |
            ghcr.io/tykrystm/voice-dictation:latest
            ghcr.io/tykrystm/voice-dictation:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update deployment image SHA
        run: |
          SHA7=$(echo "${{ github.sha }}" | cut -c1-7)
          sed -i "s|ghcr.io/tykrystm/voice-dictation:.*|ghcr.io/tykrystm/voice-dictation:${SHA7}|g" k8s/deployment.yaml

      - name: Commit updated deployment
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "[skip ci] deploy: voice-dictation ${{ github.sha }}"
          file_pattern: k8s/deployment.yaml

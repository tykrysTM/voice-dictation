<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Dictation — TMForge</title>
    <!-- v2 -->
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px 0;
            border-bottom: 2px solid #333;
        }

        header h1 {
            font-size: 2.5em;
            color: #fff;
            font-weight: 600;
            letter-spacing: -1px;
        }

        .controls-row {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            align-items: center;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        #start-rec {
            background: #4CAF50;
            color: white;
        }

        #start-rec:hover {
            background: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
        }

        #start-rec:active {
            transform: translateY(0);
        }

        #stop-rec {
            background: #f44336;
            color: white;
            opacity: 0.5;
            cursor: not-allowed;
        }

        #stop-rec:not(:disabled) {
            opacity: 1;
            cursor: pointer;
        }

        #stop-rec:not(:disabled):hover {
            background: #da190b;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(244, 67, 54, 0.3);
        }

        select {
            padding: 10px 15px;
            border: 1px solid #444;
            border-radius: 6px;
            background: #2a2a2a;
            color: #e0e0e0;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        select:hover {
            border-color: #666;
            background: #333;
        }

        select:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 0 2px rgba(76, 175, 80, 0.2);
        }

        .content-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
            flex: 1;
        }

        .panel {
            display: flex;
            flex-direction: column;
            background: #252525;
            border: 1px solid #333;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .panel-header {
            background: #2a2a2a;
            padding: 15px;
            border-bottom: 1px solid #333;
            font-weight: 600;
            color: #fff;
        }

        .panel-body {
            padding: 15px;
            flex: 1;
            overflow-y: auto;
        }

        #transcribed-text {
            width: 100%;
            min-height: 300px;
            padding: 10px;
            background: #1a1a1a;
            color: #e0e0e0;
            border: none;
            resize: none;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.95em;
            line-height: 1.5;
        }

        #transcribed-text:focus {
            outline: none;
            box-shadow: inset 0 0 0 2px #4CAF50;
        }

        #rewritten-text {
            width: 100%;
            min-height: 300px;
            padding: 10px;
            background: #1a1a1a;
            color: #e0e0e0;
            font-size: 0.95em;
            line-height: 1.5;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        #rewritten-text.error {
            color: #f44336;
            font-weight: 500;
        }

        .actions-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        #rewrite-btn {
            padding: 10px 20px;
            background: #FF9800;
            color: #000;
            border: none;
            border-radius: 6px;
            font-size: 0.95em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        #rewrite-btn:hover {
            background: #F57C00;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 152, 0, 0.3);
        }

        #rewrite-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        #copy-btn,
        #paste-btn {
            padding: 10px 20px;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 0.95em;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        #copy-btn:hover,
        #paste-btn:hover {
            background: #0b7dda;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(33, 150, 243, 0.3);
        }

        #copy-btn:active,
        #paste-btn:active {
            transform: translateY(0);
        }

        .status-bar {
            background: #2a2a2a;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 12px 15px;
            margin-bottom: 20px;
            min-height: 40px;
            display: flex;
            align-items: center;
            font-weight: 500;
            color: #4CAF50;
        }

        .status-bar.recording {
            background: #4CAF50;
            color: #000;
            font-weight: 600;
        }

        .status-bar.processing {
            background: #FF9800;
            color: #000;
            font-weight: 600;
        }

        .status-bar.error {
            background: #f44336;
            color: #fff;
        }

        .settings-section {
            margin-top: 30px;
            border-top: 2px solid #333;
            padding-top: 20px;
        }

        .auth-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .auth-overlay.open {
            display: flex;
        }

        .auth-box {
            background: #252525;
            border: 1px solid #444;
            border-radius: 10px;
            padding: 30px;
            min-width: 320px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .auth-box h3 {
            margin: 0;
            color: #fff;
            font-size: 1.1em;
        }

        .auth-box input[type="password"] {
            width: 100%;
            padding: 10px;
            background: #1a1a1a;
            border: 1px solid #444;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 1em;
            box-sizing: border-box;
        }

        .auth-box input[type="password"]:focus {
            outline: none;
            border-color: #4CAF50;
        }

        .auth-error {
            color: #f44336;
            font-size: 0.9em;
            display: none;
        }

        .auth-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .auth-buttons button {
            padding: 8px 18px;
            font-size: 0.95em;
        }

        .settings-toggle {
            background: #333;
            color: #e0e0e0;
            border: 1px solid #444;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .settings-toggle:hover {
            background: #3a3a3a;
            border-color: #666;
        }

        .settings-content {
            display: none;
            margin-top: 15px;
            padding: 15px;
            background: #252525;
            border: 1px solid #333;
            border-radius: 6px;
        }

        .settings-content.open {
            display: block;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #fff;
        }

        #backend-url {
            width: 100%;
            padding: 10px;
            background: #1a1a1a;
            border: 1px solid #444;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 0.95em;
        }

        #backend-url:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 0 2px rgba(76, 175, 80, 0.2);
        }

        #system-prompt {
            width: 100%;
            min-height: 100px;
            padding: 10px;
            background: #1a1a1a;
            border: 1px solid #444;
            border-radius: 6px;
            color: #e0e0e0;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.9em;
            resize: vertical;
        }

        #system-prompt:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 0 2px rgba(76, 175, 80, 0.2);
        }

        @media (max-width: 1024px) {
            .content-area {
                grid-template-columns: 1fr;
            }

            header h1 {
                font-size: 2em;
            }
        }

        #gpu-live-btn {
            background: #00897B;
            color: white;
        }

        #gpu-live-btn:hover {
            background: #00695C;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 137, 123, 0.3);
        }

        #gpu-live-btn.active {
            background: #00ACC1;
            animation: pulse 1.5s infinite;
        }

        #live-mode-btn {
            background: #9C27B0;
            color: white;
        }

        #live-mode-btn:hover {
            background: #7B1FA2;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(156, 39, 176, 0.3);
        }

        #live-mode-btn.active {
            background: #E91E63;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(233, 30, 99, 0.4); }
            50% { box-shadow: 0 0 0 8px rgba(233, 30, 99, 0); }
        }

        .interim-text {
            color: #888;
            font-style: italic;
        }

        #translate-label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #e0e0e0;
            font-size: 0.95em;
            cursor: pointer;
            padding: 10px 15px;
            border: 1px solid #444;
            border-radius: 6px;
            background: #2a2a2a;
            transition: all 0.2s ease;
            user-select: none;
        }

        #translate-label:hover {
            border-color: #666;
            background: #333;
        }

        #translate-label input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #4CAF50;
            cursor: pointer;
        }

        @media (max-width: 640px) {
            .controls-row {
                flex-direction: column;
            }

            button,
            select {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎤 Voice Dictation</h1>
        </header>

        <div class="controls-row">
            <button id="start-rec">Start Recording</button>
            <button id="stop-rec" disabled>Stop Recording</button>
            <select id="language">
                <option value="pl">Polish (PL)</option>
                <option value="en">English (EN)</option>
            </select>
            <select id="model">
                <option value="local">With Rewrite</option>
                <option value="cloud">Transcribe Only</option>
            </select>
            <button id="live-mode-btn" title="Live transcription via browser Speech API">🎙 Live Mode</button>
            <button id="gpu-live-btn" title="Live transcription via Whisper GPU (requires realtimestt_server.py on PC TM)">⚡ GPU Live</button>
            <label id="translate-label">
                <input type="checkbox" id="translate-en" checked>
                Translate to English
            </label>
        </div>

        <div class="status-bar" id="rec-status">Ready</div>

        <div class="content-area">
            <div class="panel">
                <div class="panel-header">Raw Transcript</div>
                <div class="panel-body">
                    <textarea id="transcribed-text"></textarea>
                </div>
            </div>
            <div class="panel">
                <div class="panel-header">Polished</div>
                <div class="panel-body">
                    <div id="rewritten-text"></div>
                </div>
            </div>
        </div>

        <div class="actions-row">
            <button id="rewrite-btn">✨ Polish Transcript</button>
            <button id="copy-btn">Copy Polished</button>
            <button id="paste-btn">Paste to Transcript</button>
        </div>

        <div class="settings-section">
            <button class="settings-toggle" onclick="toggleSettings()">⚙️ Settings</button>
            <div class="settings-content" id="settings-content">
                <div class="form-group">
                    <label for="backend-url">Backend URL:</label>
                    <input type="url" id="backend-url" placeholder="/transcribe" value="/transcribe">
                </div>
                <div class="form-group">
                    <label for="system-prompt">System Prompt:</label>
                    <textarea id="system-prompt" placeholder="Enter system prompt here...">Popraw gramatykę, interpunkcję i styl. Nadaj tekstowi profesjonalne, formalne brzmienie. Zachowaj oryginalną treść i strukturę.</textarea>
                </div>
            </div>
        </div>
    </div>

    <div class="auth-overlay" id="auth-overlay">
        <div class="auth-box">
            <h3>⚙️ Settings — Authorization required</h3>
            <input type="password" id="auth-password" placeholder="Enter password…" autocomplete="off">
            <div class="auth-error" id="auth-error">Incorrect password.</div>
            <div class="auth-buttons">
                <button class="settings-toggle" onclick="closeAuthModal()">Cancel</button>
                <button id="start-rec" style="background:#4CAF50" onclick="submitAuth()">Unlock</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        let _settingsUnlocked = false;

        function toggleSettings() {
            const content = document.getElementById('settings-content');
            if (content.classList.contains('open')) {
                content.classList.remove('open');
                return;
            }
            if (_settingsUnlocked) {
                content.classList.add('open');
            } else {
                document.getElementById('auth-overlay').classList.add('open');
                setTimeout(() => document.getElementById('auth-password').focus(), 50);
            }
        }

        function closeAuthModal() {
            document.getElementById('auth-overlay').classList.remove('open');
            document.getElementById('auth-password').value = '';
            document.getElementById('auth-error').style.display = 'none';
        }

        async function submitAuth() {
            const password = document.getElementById('auth-password').value;
            const errorEl = document.getElementById('auth-error');
            errorEl.style.display = 'none';

            try {
                const res = await fetch('/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                if (res.ok) {
                    _settingsUnlocked = true;
                    closeAuthModal();
                    document.getElementById('settings-content').classList.add('open');
                } else {
                    errorEl.style.display = 'block';
                    document.getElementById('auth-password').value = '';
                    document.getElementById('auth-password').focus();
                }
            } catch (e) {
                errorEl.textContent = 'Connection error.';
                errorEl.style.display = 'block';
            }
        }

        document.getElementById('auth-password').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') submitAuth();
            if (e.key === 'Escape') closeAuthModal();
        });
    </script>
</body>
</html>
